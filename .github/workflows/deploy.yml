name: Deploy to VPS

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: cyan-eels-grow.loca.lt
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 443
          sync: true
          key_path: ""
          fingerprint: ""
          script_stop: true
          script: |
            cd /var/www/html
            git pull origin main