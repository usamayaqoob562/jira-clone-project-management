name: Deploy to VPS

on:
  push:
    branches:
      - main  # Agar aapki main branch ka naam 'master' hai, to yahan master likh dein

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/html
            git pull origin main  # Agar branch 'master' hai to yahan bhi master kar dein
